<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>Marketing Assistant</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--s1:#111;--s2:#1a1a1a;--s3:#222;--border:#2c2c2c;
  --text:#f2f2f2;--muted:#666;--muted2:#444;
  --hlc:#3AAA35;--dj:#c9a96e;--sn:#d4a017;
  --accent:#3AAA35;--r:14px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}
body[data-biz="hlc"]{--accent:var(--hlc)}
body[data-biz="dj"]{--accent:var(--dj)}
body[data-biz="sn"]{--accent:var(--sn)}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);transition:background .2s;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;letter-spacing:-.01em}
.hdr-biz{margin-left:auto;font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap}

/* Mode toggle */
.mode-row{display:flex;padding:10px 18px;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.mode-btn{flex:1;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#000}

/* Biz tabs */
.biz-row{display:flex;gap:7px;padding:10px 18px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.biz-row::-webkit-scrollbar{display:none}
.biz-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.biz-tab.active{color:#000;border-color:var(--accent);background:var(--accent);font-weight:700}

/* Type chips */
.type-row{display:flex;gap:6px;padding:10px 18px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.type-row::-webkit-scrollbar{display:none}
.type-chip{flex-shrink:0;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font)}
.type-chip.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent)}

/* Scroll */
.scroll{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;min-height:0}

/* Empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:40px 20px;min-height:200px}
.empty-icon{font-size:40px;opacity:.3}
.empty p{font-size:14px;line-height:1.6;color:var(--muted)}
.empty span{font-size:12px;opacity:.5}

/* Suggestion card */
.sug-card{background:var(--s1);border:1.5px solid var(--accent);border-radius:var(--r);overflow:hidden;animation:fadeUp .2s ease}
.sug-top{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.sug-header{display:flex;align-items:center;gap:8px}
.sug-badge{background:var(--accent);color:#000;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.07em}
.sug-bizname{font-size:12px;color:var(--muted);font-weight:500}
.sug-idea{font-size:19px;font-weight:800;color:var(--text);line-height:1.2;letter-spacing:-.01em}
.sug-type{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sug-seasonal{font-size:12px;color:var(--accent);font-weight:600;background:color-mix(in srgb,var(--accent) 10%,transparent);padding:5px 10px;border-radius:7px}
.sug-brief{font-size:13px;color:#aaa;line-height:1.55}
.sug-reasoning{font-size:11px;color:var(--muted);font-style:italic}
.sug-actions{display:flex;border-top:1px solid var(--border)}
.sug-btn{flex:1;padding:13px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:var(--font)}
.sug-btn.approve{background:var(--accent);color:#000}
.sug-btn.reject{background:var(--s2);color:var(--muted);border-left:1px solid var(--border)}
.sug-btn:active{opacity:.75}

/* Image search panel */
.img-search-panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:fadeUp .2s ease}
.img-search-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.img-search-title{font-size:13px;font-weight:700;color:var(--text)}
.img-search-bar{display:flex;gap:8px}
.img-search-input{flex:1;background:var(--s2);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s}
.img-search-input:focus{border-color:var(--accent)}
.img-search-input::placeholder{color:var(--muted2)}
.img-search-go{padding:9px 14px;border-radius:9px;border:none;background:var(--accent);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.img-suggestions{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.img-suggestions::-webkit-scrollbar{display:none}
.img-sug-chip{flex-shrink:0;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s}
.img-sug-chip:active{border-color:var(--accent);color:var(--accent)}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px}
.img-thumb{aspect-ratio:1;object-fit:cover;cursor:pointer;transition:opacity .15s;border-radius:4px}
.img-thumb:active{opacity:.7}
.img-thumb.selected{outline:3px solid var(--accent);outline-offset:-3px}
.img-load-more{width:100%;padding:11px;border:none;background:var(--s2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);border-top:1px solid var(--border)}
.img-use-btn{width:100%;padding:13px;border:none;background:var(--accent);color:#000;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);display:none}
.img-use-btn.visible{display:block}
.img-searching{padding:20px;text-align:center;color:var(--muted);font-size:13px}

/* Options panel */
.options-panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:fadeUp .2s ease}
.options-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.options-title{font-size:13px;font-weight:700;color:var(--text)}
.options-skip{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;background:none;border:none;font-family:var(--font)}
.options-body{padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.opt-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.opt-chips{display:flex;flex-wrap:wrap;gap:6px}
.opt-chip{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font)}
.opt-chip.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);font-weight:700}
.opt-input{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s}
.opt-input:focus{border-color:var(--accent)}
.opt-input::placeholder{color:var(--muted2)}
.gen-btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#000;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.gen-btn:active{opacity:.8}

/* Output card */
.out-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:fadeUp .2s ease}
.out-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--s2)}
.out-img.story{aspect-ratio:9/16}
.plat-tabs{display:flex;border-bottom:1px solid var(--border)}
.plat-tab{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.04em}
.plat-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.caption-panel{display:none;padding:14px 16px;flex-direction:column;gap:10px}
.caption-panel.active{display:flex}
.caption-text{font-size:14px;line-height:1.65;color:var(--text);white-space:pre-wrap}
.hashtag-row{display:flex;flex-wrap:wrap;gap:6px}
.hashtag{font-size:12px;color:var(--accent);font-weight:600;background:color-mix(in srgb,var(--accent) 10%,transparent);padding:4px 9px;border-radius:6px}
.copy-row{display:flex;gap:7px}
.copy-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.copy-btn:active{background:var(--border)}
.copy-btn.copied{color:var(--accent);border-color:var(--accent)}
.save-btn{padding:9px 14px;border-radius:9px;border:none;background:var(--accent);color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}

/* Thinking */
.thinking{display:flex;gap:5px;align-items:center;padding:16px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r)}
.thinking-label{font-size:12px;color:var(--muted);margin-left:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:pulse 1.3s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Input area */
.input-area{border-top:1px solid var(--border);background:var(--bg);padding:10px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.upload-row{display:flex;gap:8px;align-items:center}
.upload-btn{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.upload-btn.has-image{border-color:var(--accent);color:var(--accent);border-style:solid}
.search-img-btn{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.search-img-btn:active{border-color:var(--accent);color:var(--accent)}
.fmt-row{display:flex;gap:5px;margin-left:auto}
.fmt-btn{padding:6px 10px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.fmt-btn.active{border-color:var(--accent);color:var(--accent)}
.text-row{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;background:var(--s1);border:1.5px solid var(--border);border-radius:11px;padding:10px 13px;transition:border-color .15s}
.input-wrap:focus-within{border-color:var(--accent)}
textarea{background:none;border:none;color:var(--text);font-family:var(--font);font-size:15px;resize:none;outline:none;width:100%;max-height:100px;line-height:1.5}
textarea::placeholder{color:var(--muted2)}
.send-btn{width:42px;height:42px;border-radius:11px;background:var(--accent);border:none;color:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .15s}
.send-btn:disabled{opacity:.3}
.send-btn:active:not(:disabled){opacity:.7}
.thumb-wrap{position:relative}
.thumb{width:38px;height:38px;border-radius:7px;object-fit:cover;border:2px solid var(--accent)}
.thumb-rm{position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:#ff3b30;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.progress{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .35s ease}
#fileInput{display:none}
</style>
</head>
<body data-biz="hlc">

<div class="hdr">
  <div class="hdr-dot"></div>
  <h1>Marketing Assistant</h1>
  <span class="hdr-biz" id="hdrBiz">HLC Bay Ridge</span>
</div>

<div class="mode-row">
  <button class="mode-btn active" id="modeAuto" onclick="setMode('auto')">✦ Auto</button>
  <button class="mode-btn" id="modeManual" onclick="setMode('manual')">Manual</button>
</div>

<div class="biz-row">
  <button class="biz-tab active" data-biz="hlc">HLC Bay Ridge</button>
  <button class="biz-tab" data-biz="dj">David James</button>
  <button class="biz-tab" data-biz="sn">Samarkand Nights</button>
</div>

<div class="type-row" id="typeRow" style="display:none"></div>

<div class="scroll" id="scroll">
  <div class="empty" id="empty">
    <div class="empty-icon">✦</div>
    <p id="emptyMsg">Upload your photo or search for one. The assistant handles the rest.</p>
    <span id="emptyHint">Business. Platform. Copy. Hashtags. All automatic.</span>
  </div>
</div>

<div class="input-area">
  <div class="upload-row">
    <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span id="uploadLabel">My Photo</span>
    </button>
    <button class="search-img-btn" onclick="showImageSearch()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Find Image
    </button>
    <div class="thumb-wrap" id="thumbWrap" style="display:none">
      <img id="thumbImg" class="thumb" src="" alt="">
      <button class="thumb-rm" onclick="clearImage()">×</button>
    </div>
    <div class="fmt-row">
      <button class="fmt-btn active" onclick="setFmt(this,'square')">1:1</button>
      <button class="fmt-btn" onclick="setFmt(this,'story')">9:16</button>
    </div>
  </div>
  <div class="progress" id="progressWrap" style="display:none">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="text-row">
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="Add context or just hit send..."></textarea>
    </div>
    <button class="send-btn" id="sendBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
const BIZ_NAMES={hlc:"HLC Bay Ridge",dj:"David James",sn:"Samarkand Nights"};
const TYPES={
  hlc:["Instagram Caption","Carousel Copy","Reel Script","Facebook Post","Email Blast","Google Ad","SMS Blast","Parent Letter"],
  dj:["Instagram Caption","Carousel Copy","Reel Script","Promo Post","Email Blast","Google Ad","SMS Blast"],
  sn:["Instagram Caption","Carousel Copy","Reel Script","Promo Post","Email Blast","Google Ad","SMS Blast","Event Promo"]
};
const CTA_OPTIONS=[
  {val:"none",label:"No CTA"},{val:"call-us",label:"Call Us"},
  {val:"book-now",label:"Book Now"},{val:"dm-us",label:"DM Us"},
  {val:"link-in-bio",label:"Link in Bio"},{val:"visit-us",label:"Visit Us"}
];

let currentMode="auto",currentBiz="hlc",currentType=TYPES.hlc[0],currentFmt="square";
let imageBase64=null,isLoading=false,pendingSug=null,pendingGenParams=null;
let optTone="casual",optCta="none",optPromo="";
let imgSearchPage=1,imgSearchQuery="",imgSearchSelected=null,imgSearchResults=[];

const scroll=document.getElementById("scroll");
const empty=document.getElementById("empty");
const userInput=document.getElementById("userInput");
const sendBtn=document.getElementById("sendBtn");
const progressWrap=document.getElementById("progressWrap");
const progressBar=document.getElementById("progressBar");

function setMode(m){
  currentMode=m;
  document.getElementById("modeAuto").classList.toggle("active",m==="auto");
  document.getElementById("modeManual").classList.toggle("active",m==="manual");
  document.getElementById("typeRow").style.display=m==="manual"?"flex":"none";
  userInput.placeholder=m==="auto"?"Add context or just hit send...":"Describe what you need...";
  document.getElementById("emptyMsg").textContent="Upload your photo or search for one. The assistant handles the rest.";
  checkReady();
}

function renderTypes(){
  const row=document.getElementById("typeRow");
  row.innerHTML="";
  TYPES[currentBiz].forEach(t=>{
    const btn=document.createElement("button");
    btn.className="type-chip"+(t===currentType?" active":"");
    btn.textContent=t;btn.onclick=()=>{currentType=t;renderTypes()};
    row.appendChild(btn);
  });
}

document.querySelectorAll(".biz-tab").forEach(tab=>{
  tab.onclick=()=>{
    currentBiz=tab.dataset.biz;
    document.body.dataset.biz=currentBiz;
    document.getElementById("hdrBiz").textContent=BIZ_NAMES[currentBiz];
    currentType=TYPES[currentBiz][0];
    document.querySelectorAll(".biz-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    renderTypes();
  };
});

function setFmt(btn,fmt){
  currentFmt=fmt;
  document.querySelectorAll(".fmt-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ── Own photo upload ──
document.getElementById("fileInput").addEventListener("change",e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const dataUrl=ev.target.result;
    imageBase64=dataUrl.split(",")[1];
    setThumb(dataUrl);checkReady();
    if(currentMode==="auto") analyzeAndSuggest();
  };
  reader.readAsDataURL(file);
  e.target.value="";
});

function setThumb(src){
  document.getElementById("thumbImg").src=src;
  document.getElementById("thumbWrap").style.display="block";
  document.getElementById("uploadLabel").textContent="Change";
  document.getElementById("uploadBtn").classList.add("has-image");
}

function clearImage(){
  imageBase64=null;imgSearchSelected=null;
  document.getElementById("thumbImg").src="";
  document.getElementById("thumbWrap").style.display="none";
  document.getElementById("uploadLabel").textContent="My Photo";
  document.getElementById("uploadBtn").classList.remove("has-image");
  checkReady();
}

// ── Image Search ──
function showImageSearch(){
  showEmpty(false);
  if(document.getElementById("imgSearchPanel")) return;

  const panel=document.createElement("div");
  panel.className="img-search-panel";panel.id="imgSearchPanel";
  panel.innerHTML=`
    <div class="img-search-header">
      <div class="img-search-title">🔍 Find a Photo</div>
      <div class="img-search-bar">
        <input class="img-search-input" id="imgSearchInput" placeholder="Search photos..." value="${imgSearchQuery}">
        <button class="img-search-go" onclick="runImageSearch()">Search</button>
      </div>
      <div class="img-suggestions" id="imgSuggestions"></div>
    </div>
    <div id="imgGrid"></div>
    <button class="img-use-btn" id="imgUseBtn" onclick="useSelectedImage()">Use This Photo ✦</button>`;
  scroll.appendChild(panel);
  scroll.scrollTop=scroll.scrollHeight;

  document.getElementById("imgSearchInput").addEventListener("keydown",e=>{
    if(e.key==="Enter"){e.preventDefault();runImageSearch()}
  });

  // Load default suggestions for this biz and run initial search
  loadImgSuggestions();
  runImageSearch(true);
}

async function loadImgSuggestions(){
  const sugRow=document.getElementById("imgSuggestions");
  if(!sugRow)return;
  try{
    const res=await fetch("/.netlify/functions/search-images",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query:"",biz:currentBiz,page:1})
    });
    const data=await res.json();
    sugRow.innerHTML="";
    (data.suggestions||[]).slice(0,5).forEach(s=>{
      const btn=document.createElement("button");
      btn.className="img-sug-chip";btn.textContent=s;
      btn.onclick=()=>{
        document.getElementById("imgSearchInput").value=s;
        imgSearchQuery=s;runImageSearch();
      };
      sugRow.appendChild(btn);
    });
  }catch(e){}
}

async function runImageSearch(initial=false){
  const input=document.getElementById("imgSearchInput");
  if(input) imgSearchQuery=input.value.trim()||getBizDefaultSearch();
  imgSearchPage=1;imgSearchSelected=null;
  const grid=document.getElementById("imgGrid");
  const useBtn=document.getElementById("imgUseBtn");
  if(!grid)return;
  if(useBtn){useBtn.classList.remove("visible")}
  grid.innerHTML=`<div class="img-searching">Searching...</div>`;

  try{
    const res=await fetch("/.netlify/functions/search-images",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query:imgSearchQuery,biz:currentBiz,page:1})
    });
    const data=await res.json();
    imgSearchResults=data.photos||[];
    renderImgGrid();
  }catch(e){
    grid.innerHTML=`<div class="img-searching">Search failed. Try again.</div>`;
  }
}

function getBizDefaultSearch(){
  const defaults={hlc:"students studying",dj:"hair salon",sn:"Uzbek food restaurant"};
  return defaults[currentBiz]||"lifestyle";
}

function renderImgGrid(){
  const grid=document.getElementById("imgGrid");
  if(!grid)return;
  if(!imgSearchResults.length){grid.innerHTML=`<div class="img-searching">No photos found. Try a different search.</div>`;return}

  const g=document.createElement("div");
  g.className="img-grid";
  imgSearchResults.forEach(photo=>{
    const img=document.createElement("img");
    img.className="img-thumb";
    img.src=photo.thumb;img.alt=photo.alt;img.loading="lazy";
    img.onclick=()=>selectSearchPhoto(photo,img);
    g.appendChild(img);
  });
  grid.innerHTML="";
  grid.appendChild(g);

  // Load more button
  const more=document.createElement("button");
  more.className="img-load-more";more.textContent="Load more photos";
  more.onclick=()=>loadMoreImages();
  grid.appendChild(more);
}

async function loadMoreImages(){
  imgSearchPage++;
  try{
    const res=await fetch("/.netlify/functions/search-images",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query:imgSearchQuery,biz:currentBiz,page:imgSearchPage})
    });
    const data=await res.json();
    const newPhotos=data.photos||[];
    imgSearchResults=[...imgSearchResults,...newPhotos];

    // Append to grid
    const g=document.querySelector(".img-grid");
    if(g){
      newPhotos.forEach(photo=>{
        const img=document.createElement("img");
        img.className="img-thumb";img.src=photo.thumb;img.alt=photo.alt;img.loading="lazy";
        img.onclick=()=>selectSearchPhoto(photo,img);
        g.appendChild(img);
      });
    }
  }catch(e){}
}

function selectSearchPhoto(photo,imgEl){
  document.querySelectorAll(".img-thumb").forEach(i=>i.classList.remove("selected"));
  imgEl.classList.add("selected");
  imgSearchSelected=photo;
  const useBtn=document.getElementById("imgUseBtn");
  if(useBtn) useBtn.classList.add("visible");
  scroll.scrollTop=scroll.scrollHeight;
}

async function useSelectedImage(){
  if(!imgSearchSelected)return;

  // Fetch the regular size image as base64
  const useBtn=document.getElementById("imgUseBtn");
  if(useBtn) useBtn.textContent="Loading...";

  try{
    const res=await fetch(imgSearchSelected.regular);
    const blob=await res.blob();
    const reader=new FileReader();
    reader.onload=ev=>{
      imageBase64=ev.target.result.split(",")[1];
      setThumb(imgSearchSelected.thumb);
      document.getElementById("imgSearchPanel")?.remove();
      checkReady();
      if(currentMode==="auto") analyzeAndSuggest();
    };
    reader.readAsDataURL(blob);
  }catch(e){
    if(useBtn) useBtn.textContent="Use This Photo ✦";
  }
}

userInput.addEventListener("input",()=>{
  checkReady();
  userInput.style.height="auto";
  userInput.style.height=Math.min(userInput.scrollHeight,100)+"px";
});
userInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled)onSend()}
});
sendBtn.onclick=onSend;

function onSend(){
  if(currentMode==="auto") analyzeAndSuggest();
  else manualSend();
}

function checkReady(){
  sendBtn.disabled=isLoading||(currentMode==="auto"?!imageBase64:(!userInput.value.trim()&&!imageBase64));
}

function setProgress(pct){
  if(pct===null){progressWrap.style.display="none";return}
  progressWrap.style.display="block";progressBar.style.width=pct+"%";
}
function showEmpty(v){empty.style.display=v?"flex":"none"}
function addThinking(label){
  showEmpty(false);
  const el=document.createElement("div");el.className="thinking";el.id="thinking";
  for(let i=0;i<3;i++){const d=document.createElement("div");d.className="dot";el.appendChild(d)}
  const lbl=document.createElement("span");lbl.className="thinking-label";lbl.textContent=label||"Thinking...";el.appendChild(lbl);
  scroll.appendChild(el);scroll.scrollTop=scroll.scrollHeight;
}
function removeThinking(){document.getElementById("thinking")?.remove()}
function updateThinking(label){const l=document.querySelector(".thinking-label");if(l)l.textContent=label}

// ── Auto analyze ──
async function analyzeAndSuggest(){
  if(!imageBase64||isLoading)return;
  isLoading=true;sendBtn.disabled=true;
  setProgress(15);addThinking("Analyzing your photo...");
  try{
    const res=await fetch("/.netlify/functions/analyze-image",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({imageBase64,currentBiz})
    });
    const s=await res.json();
    setProgress(50);removeThinking();
    showSuggestion(s);
  }catch(e){removeThinking();setProgress(null);addErrorCard("Could not analyze the image. Try again.")}
  isLoading=false;checkReady();
}

function showSuggestion(s){
  pendingSug=s;showEmpty(false);
  const card=document.createElement("div");card.className="sug-card";card.id="sugCard";
  card.innerHTML=`
    <div class="sug-top">
      <div class="sug-header"><span class="sug-badge">Auto</span><span class="sug-bizname">${BIZ_NAMES[s.biz]||s.biz}</span></div>
      <div class="sug-idea">${s.postIdea||"New Post"}</div>
      <div class="sug-type">${s.contentType}</div>
      ${s.seasonalHook?`<div class="sug-seasonal">📅 ${s.seasonalHook}</div>`:""}
      <div class="sug-brief">${s.brief}</div>
      ${s.reasoning?`<div class="sug-reasoning">${s.reasoning}</div>`:""}
    </div>
    <div class="sug-actions">
      <button class="sug-btn approve" onclick="approveSuggestion()">Looks good. Set options.</button>
      <button class="sug-btn reject" onclick="rejectSuggestion()">Try again</button>
    </div>`;
  scroll.appendChild(card);scroll.scrollTop=scroll.scrollHeight;setProgress(null);
}

function approveSuggestion(){
  document.getElementById("sugCard")?.remove();
  const s=pendingSug;pendingSug=null;
  currentBiz=s.biz;currentType=s.contentType;
  document.body.dataset.biz=currentBiz;
  document.getElementById("hdrBiz").textContent=BIZ_NAMES[currentBiz];
  document.querySelectorAll(".biz-tab").forEach(t=>t.classList.toggle("active",t.dataset.biz===currentBiz));
  pendingGenParams={biz:s.biz,brief:s.brief,seasonalHook:s.seasonalHook};
  showOptionsPanel();
}
function rejectSuggestion(){document.getElementById("sugCard")?.remove();pendingSug=null;analyzeAndSuggest()}

// ── Manual ──
function manualSend(){
  const brief=userInput.value.trim();
  if(isLoading||(!brief&&!imageBase64))return;
  userInput.value="";userInput.style.height="auto";
  pendingGenParams={biz:currentBiz,brief:brief||"Write a post for this image.",seasonalHook:null};
  showOptionsPanel();
}

// ── Options ──
function showOptionsPanel(){
  showEmpty(false);optTone="casual";optCta="none";optPromo="";
  const panel=document.createElement("div");panel.className="options-panel";panel.id="optPanel";
  panel.innerHTML=`
    <div class="options-header">
      <span class="options-title">Post Options</span>
      <button class="options-skip" onclick="skipOptions()">Skip, generate now</button>
    </div>
    <div class="options-body">
      <div>
        <div class="opt-label">Tone</div>
        <div class="opt-chips">
          <button class="opt-chip" data-val="professional" onclick="setOpt('tone',this)">Professional</button>
          <button class="opt-chip active" data-val="casual" onclick="setOpt('tone',this)">Casual</button>
          <button class="opt-chip" data-val="hype" onclick="setOpt('tone',this)">Hype</button>
        </div>
      </div>
      <div>
        <div class="opt-label">Call to Action</div>
        <div class="opt-chips">
          ${CTA_OPTIONS.map(c=>`<button class="opt-chip${c.val==="none"?" active":""}" data-val="${c.val}" onclick="setOpt('cta',this)">${c.label}</button>`).join("")}
        </div>
      </div>
      <div>
        <div class="opt-label">Promo or Offer (optional)</div>
        <input class="opt-input" placeholder="e.g. 10% off first session, free consultation..." oninput="optPromo=this.value">
      </div>
      <button class="gen-btn" onclick="generateFromOptions()">Generate Posts ✦</button>
    </div>`;
  scroll.appendChild(panel);scroll.scrollTop=scroll.scrollHeight;
}

function setOpt(type,btn){
  btn.parentElement.querySelectorAll(".opt-chip").forEach(c=>c.classList.remove("active"));
  btn.classList.add("active");
  if(type==="tone") optTone=btn.dataset.val;
  if(type==="cta") optCta=btn.dataset.val;
}
function skipOptions(){document.getElementById("optPanel")?.remove();generatePost()}
function generateFromOptions(){document.getElementById("optPanel")?.remove();generatePost()}

// ── Generate ──
async function generatePost(){
  if(!pendingGenParams)return;
  const {biz,brief,seasonalHook}=pendingGenParams;pendingGenParams=null;
  isLoading=true;sendBtn.disabled=true;
  setProgress(10);addThinking("Branding your image...");

  let brandedUrl=null;
  if(imageBase64){
    try{
      const res=await fetch("/.netlify/functions/brand-image",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({imageBase64,biz,format:currentFmt})
      });
      const d=await res.json();brandedUrl=d.brandedUrl||null;
    }catch(e){console.error("Brand failed",e)}
  }

  setProgress(55);updateThinking("Writing your captions...");

  try{
    const res=await fetch("/.netlify/functions/generate-copy",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({biz,brief,imageBase64,seasonalHook,tone:optTone,cta:optCta,promo:optPromo})
    });
    const data=await res.json();
    setProgress(100);removeThinking();
    setTimeout(()=>setProgress(null),400);
    addOutputCard(brandedUrl,data,currentFmt);
  }catch(e){
    removeThinking();setProgress(null);addErrorCard("Error generating captions. Try again.");
  }
  isLoading=false;checkReady();
}

// ── Output card ──
function addOutputCard(brandedUrl,platforms,fmt){
  showEmpty(false);
  const card=document.createElement("div");card.className="out-card";

  if(brandedUrl){
    const img=document.createElement("img");
    img.className="out-img"+(fmt==="story"?" story":"");
    img.src=brandedUrl;img.alt="Branded post";
    card.appendChild(img);
  }

  const platKeys=["instagram","tiktok","facebook"];
  const platLabels={instagram:"📸 IG",tiktok:"🎵 TikTok",facebook:"👥 FB"};
  const tabBar=document.createElement("div");tabBar.className="plat-tabs";
  const panels={};

  platKeys.forEach((p,i)=>{
    const tab=document.createElement("button");
    tab.className="plat-tab"+(i===0?" active":"");
    tab.textContent=platLabels[p];
    tab.onclick=()=>{
      tabBar.querySelectorAll(".plat-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      platKeys.forEach(pk=>panels[pk].classList.remove("active"));
      panels[p].classList.add("active");
    };
    tabBar.appendChild(tab);
  });
  card.appendChild(tabBar);

  platKeys.forEach((p,i)=>{
    const pdata=platforms[p]||{};
    const caption=pdata.caption||"";
    const hashtags=pdata.hashtags||[];
    const panel=document.createElement("div");
    panel.className="caption-panel"+(i===0?" active":"");
    panels[p]=panel;

    const captionEl=document.createElement("div");captionEl.className="caption-text";captionEl.textContent=caption;
    panel.appendChild(captionEl);

    if(hashtags.length){
      const hrow=document.createElement("div");hrow.className="hashtag-row";
      hashtags.forEach(h=>{const tag=document.createElement("span");tag.className="hashtag";tag.textContent=h;hrow.appendChild(tag)});
      panel.appendChild(hrow);
    }

    const copyRow=document.createElement("div");copyRow.className="copy-row";

    const copyCapBtn=document.createElement("button");copyCapBtn.className="copy-btn";copyCapBtn.textContent="Copy Caption";
    copyCapBtn.onclick=()=>copyText(caption,copyCapBtn,"Copy Caption");
    const copyAllBtn=document.createElement("button");copyAllBtn.className="copy-btn";copyAllBtn.textContent="Copy All";
    copyAllBtn.onclick=()=>copyText(caption+"\n\n"+hashtags.join(" "),copyAllBtn,"Copy All");

    copyRow.appendChild(copyCapBtn);copyRow.appendChild(copyAllBtn);

    if(brandedUrl){
      const saveBtn=document.createElement("button");saveBtn.className="save-btn";saveBtn.textContent="Save Image";
      saveBtn.onclick=()=>{const a=document.createElement("a");a.href=brandedUrl;a.download="post.jpg";a.target="_blank";a.click()};
      copyRow.appendChild(saveBtn);
    }

    panel.appendChild(copyRow);card.appendChild(panel);
  });

  scroll.appendChild(card);scroll.scrollTop=scroll.scrollHeight;
}

function copyText(text,btn,label){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied!";btn.classList.add("copied");
    setTimeout(()=>{btn.textContent=label;btn.classList.remove("copied")},2000);
  });
}

function addErrorCard(msg){
  showEmpty(false);
  const el=document.createElement("div");el.className="out-card";
  el.innerHTML=`<div class="caption-panel active"><div class="caption-text" style="color:var(--muted)">${msg}</div></div>`;
  scroll.appendChild(el);
}

renderTypes();
</script>
</body>
</html>
